<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: "Hanken Grotesk", sans-serif;
      font-size: 1.125rem;
      background-color: hsl(221, 100%, 96%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .container {
      max-width: 736px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background-color: hsl(0, 0%, 100%);
      border-radius: 20px;
      overflow: hidden;
    }

    .results {
      background: linear-gradient(hsl(252, 100%, 67%), hsl(241, 81%, 54%));
      border-radius: 20px;
      padding: 30px;
      color: hsl(0, 0%, 100%);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 20px;
    }

    .circle {
      background: linear-gradient(hsla(256, 72%, 46%, 1), hsla(241, 72%, 46%, 0));
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      padding: 0;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .results>h2 {
      color: hsl(241, 100%, 89%);
    }

    .score-number {
      font-size: 4rem;
      margin: 0;
    }

    .score-total {
      color: hsl(241, 100%, 89%);
      font-size: 1rem;
      margin: 0;
    }

    .result-feedback {
      font-size: 2rem;
      margin: 0;
    }

    .result-description {
      color: hsl(241, 100%, 89%);
      font-size: 1rem;
      margin: 0 30px;
    }

    .summary {
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .summary>h2 {
      color: hsl(224, 30%, 27%);
    }

    .categories {
      display: flex;
      flex-direction: column;
      gap: 16px;
      list-style: none;
      padding: 0;
    }

    .categories>li {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      border-radius: 10px;
      align-items: center;
    }

    .category-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .reaction>.category-box {
      color: hsl(0, 100%, 67%);
    }

    .reaction {
      background-color: hsla(0, 100%, 67%, .1);
    }

    .memory>.category-box {
      color: hsl(39, 100%, 56%);
    }

    .memory {
      background-color: hsla(39, 100%, 56%, .1);
    }

    .verbal>.category-box {
      color: hsl(166, 100%, 37%);
    }

    .verbal {
      background-color: hsla(166, 100%, 37%, .1);
    }

    .visual>.category-box {
      color: hsl(234, 85%, 45%);
    }

    .visual {
      background-color: hsla(234, 85%, 45%, .1);
    }

    .category {
      font-weight: 700;
    }

    .categories p {
      margin: 0;
    }

    .score {
      color: darkgrey;
      font-weight: 700;
    }

    span {
      color: hsl(224, 30%, 27%);
      font-weight: 700;
    }

    .continue-button {
      border-radius: 30px;
      border: none;
      padding: 20px;
      color: hsl(0, 0%, 100%);
      font-size: 1rem;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      background-color: hsl(224, 30%, 27%);
    }

    .continue-button:hover {
      background: linear-gradient(hsl(252, 100%, 67%), hsl(241, 81%, 54%));
    }

    .continue-button:focus-visible {
      outline: 3px dashed hsl(241, 81%, 54%);
      outline-offset: 4px;
    }

    .attribution {
      font-size: 0.6875rem;
      text-align: center;
      padding: 10px 0;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
    @media(max-width: 600px){
      
      body{
        padding: 0;
        justify-content: flex-start;
      }
      .container{
        grid-template-columns: 1fr;
        border-radius: 0;
      }
      .results{
        border-radius: 0 0 30px 30px;
        padding: 24px;
        gap: 16px;
      }
      .circle{
        width: 130px;
        height:130px;
      }
      .score-number{
        font-size: 3rem;
      }
      .result-feedback{
        font-size: 1.5rem;
      }
      .result-description{
        margin: 0 15px;
      }
      .summary{
        padding: 24px;
        gap:16px;
      }
      .summary > h2 {
    margin-top: -4px;    
    margin-bottom: -4px; 
  }
      .categories{
        gap:12px;
      }
      .categories>li{
        padding: 12px;
      }
      .continue-button{
        padding:16px;
      }
    }
  </style>
</head>

<body>
  <h1 class="visually-hidden">Results Summary</h1>
  <div class="container">
    <div class="results">
      <h2>Your Result</h2>
      <div class="circle">
        <p class="score-number">76</p>
        <p class="score-total">of 100</p>
      </div>
      <p class="result-feedback">Great</p>
      <p class="result-description">You scored higher than 65% of the people who have taken these tests.</p>
    </div>

    <div class="summary">
      <h2>Summary</h2>

      <ul class="categories">
        <li class="reaction">
          <div class="category-box">
            <img src="./assets/images/icon-reaction.svg" alt="Reaction Icon">
            <p class="category">Reaction</p>
          </div>
          <p class="score"><span> 80</span> / 100</p>
        </li>

        <li class="memory">
          <div class="category-box">
            <img src="./assets/images/icon-memory.svg" alt="Memory Icon">
            <p class="category">Memory</p>
          </div>
          <p class="score"><span>92</span> / 100</p>
        </li>

        <li class="verbal">
          <div class="category-box">
            <img src="./assets/images/icon-verbal.svg" alt="Verbal Icon">
            <p class="category">Verbal</p>
          </div>
          <p class="score"><span> 61</span> / 100</p>
        </li>

        <li class="visual">
          <div class="category-box">
            <img src="./assets/images/icon-visual.svg" alt="Visual Icon">
            <p class="category">Visual</p>
          </div>
          <p class="score"><span>72</span> / 100</p>
        </li>

      </ul>

      <button class="continue-button">Continue</button>
    </div>

  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Justyna Nowak-Szrajnert</a>.
  </footer>
</body>

</html>
